<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tiny Platformer</title>
  <style>
    :root {
      --bg: #0e1326;
      --fg: #e6e6f0;
      --accent: #6ee7ff;
      --accent2: #a7f3d0;
      --danger: #ff6b6b;
      --gold: #ffd166;
    }
    html, body {
      height: 100%;
      margin: 0;
      background: radial-gradient(1200px 600px at 50% 0%, #1b2552, var(--bg));
      color: var(--fg);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, 'Helvetica Neue', Arial, 'Noto Sans', 'Apple Color Emoji', 'Segoe UI Emoji', 'Segoe UI Symbol';
      display: grid;
      place-items: center;
      overflow: hidden;
    }
    #frame {
      position: relative;
      display: inline-block;
      box-shadow: 0 10px 40px rgba(0,0,0,.6);
      border-radius: 16px;
      overflow: hidden;
      background: linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,0));
    }
    canvas {
      display: block;
      image-rendering: pixelated;
      width: min(96vw, 1280px);
      height: calc(min(96vw, 1280px) * (9/16)); /* keep 16:9 */
      max-height: 90vh;
      border: 2px solid rgba(255,255,255,.08);
    }
    .hud {
      position: absolute; inset: 0;
      display: flex; align-items: flex-start; justify-content: space-between;
      pointer-events: none;
      padding: 10px 14px;
      font-weight: 600;
      text-shadow: 0 2px 4px rgba(0,0,0,.5);
    }
    .hud .left, .hud .right { opacity: .9; font-size: 14px; }
    a.btn {
      position: absolute; right: 10px; bottom: 10px;
      pointer-events: auto;
      text-decoration: none; color: var(--bg);
      background: var(--accent);
      padding: 8px 12px; border-radius: 999px; font-weight: 700; font-size: 14px;
      box-shadow: 0 6px 20px rgba(110, 231, 255, .35);
    }
    a.btn:hover { filter: brightness(1.05); }
  </style>
</head>
<body>
  <div id="frame">
    <canvas id="game" width="960" height="540" aria-label="Platformer game"></canvas>
    <div class="hud">
      <div class="left" id="status">Score: 0 / 6</div>
      <div class="right">←/→ move • ↑/Space jump • R restart</div>
    </div>
    <a href="#" class="btn" id="resetBtn" title="Restart (R)">Restart</a>
  </div>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const statusEl = document.getElementById('status');
  const resetBtn = document.getElementById('resetBtn');

  // Fixed internal resolution; CSS scales to fit while preserving aspect ratio.
  const W = canvas.width;  // 960
  const H = canvas.height; // 540

  // ---- Helpers ----
  const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
  const lerp = (a, b, t) => a + (b - a) * t;

  // Rectangle collision (AABB)
  function aabb(a, b) {
    return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
  }

  function rect(x, y, w, h, color) {
    ctx.fillStyle = color;
    ctx.fillRect(x, y, w, h);
  }

  function circle(x, y, r, color) {
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.fillStyle = color; ctx.fill();
  }

  // ---- Game world ----
  let world, input, lastTime, particles;

  function makeLevel() {
    // Platforms: x, y, w, h
    const platforms = [
      {x: 0,   y: H-40, w: W,   h: 40},
      {x: 40,  y: H-140, w: 140, h: 16},
      {x: 260, y: H-220, w: 130, h: 16},
      {x: 460, y: H-180, w: 120, h: 16},
      {x: 620, y: H-260, w: 160, h: 16},
      {x: 820, y: H-320, w: 120, h: 16},
      {x: 720, y: H-110, w: 180, h: 16},
    ];

    // Coins: x, y, r
    const coins = [
      {x: 110, y: H-170, r: 10, taken:false},
      {x: 300, y: H-250, r: 10, taken:false},
      {x: 520, y: H-210, r: 10, taken:false},
      {x: 700, y: H-290, r: 10, taken:false},
      {x: 880, y: H-350, r: 10, taken:false},
      {x: 820, y: H-140, r: 10, taken:false},
    ];

    // Spikes (hazards)
    const spikes = [
      {x: 360, y: H-40-16, w: 30, h: 16, phase: 0},
      {x: 400, y: H-40-16, w: 30, h: 16, phase: Math.PI/2},
      {x: 440, y: H-40-16, w: 30, h: 16, phase: Math.PI},
    ];

    // Moving enemy platform
    const mover = {x: 160, y: H-90, w: 110, h: 14, t: 0};

    const door = {x: W-48, y: H-40-42, w: 32, h: 42, open:false};

    const player = {
      x: 20, y: H-40-32, w: 24, h: 32,
      vx: 0, vy: 0, onGround: false, facing: 1,
      jumpCount: 0, maxJumps: 1,
    };

    return { platforms, coins, spikes, mover, door, player, score:0, goal: coins.length, state:'playing' };
  }

  function reset() {
    world = makeLevel();
    particles = [];
    input = {left:false, right:false, up:false};
    lastTime = performance.now();
  }

  // ---- Input ----
  const KEY = { LEFT:["ArrowLeft","a","A"], RIGHT:["ArrowRight","d","D"], JUMP:["ArrowUp"," ","Space","w","W"] };
  addEventListener('keydown', e => {
    const k = e.key;
    if (KEY.LEFT.includes(k))  input.left = true;
    if (KEY.RIGHT.includes(k)) input.right = true;
    if (KEY.JUMP.includes(k))  { input.up = true; attemptJump(); }
    if (k === 'r' || k === 'R') reset();
  });
  addEventListener('keyup', e => {
    const k = e.key;
    if (KEY.LEFT.includes(k))  input.left = false;
    if (KEY.RIGHT.includes(k)) input.right = false;
    if (KEY.JUMP.includes(k))  input.up = false;
  });
  resetBtn.addEventListener('click', (e) => { e.preventDefault(); reset(); });

  function attemptJump() {
    const p = world.player;
    if (world.state !== 'playing') return;
    if (p.onGround || p.jumpCount < p.maxJumps) {
      p.vy = -10.5; // jump impulse
      p.onGround = false;
      p.jumpCount++;
      puff(p.x + p.w/2, p.y + p.h, 8, '#c7e6ff');
    }
  }

  // ---- Particles ----
  function puff(x, y, n, color) {
    for (let i=0;i<n;i++) {
      particles.push({ x, y, r: 2 + Math.random()*3, vx: (Math.random()-0.5)*2, vy: -Math.random()*2, life: 40+Math.random()*20, color });
    }
  }

  function updateParticles() {
    for (const pa of particles) {
      pa.x += pa.vx; pa.y += pa.vy; pa.vy += 0.06; pa.life -= 1;
    }
    particles = particles.filter(p=>p.life>0);
  }

  function drawParticles() {
    for (const p of particles) {
      ctx.globalAlpha = Math.max(0, p.life/60);
      circle(p.x, p.y, p.r, p.color);
      ctx.globalAlpha = 1;
    }
  }

  // ---- Physics ----
  const GRAVITY = 0.6;
  const ACCEL = 0.6;
  const MAXSPEED = 4.1;
  const AIR = 0.9;
  const GROUND = 0.8;

  function moveAndCollide(p, solids) {
    // Horizontal
    p.x += p.vx;
    for (const s of solids) {
      if (aabb(p, s)) {
        if (p.vx > 0) p.x = s.x - p.w; else if (p.vx < 0) p.x = s.x + s.w;
        p.vx = 0;
      }
    }
    // Vertical
    p.y += p.vy;
    p.onGround = false;
    for (const s of solids) {
      if (aabb(p, s)) {
        if (p.vy > 0) { p.y = s.y - p.h; p.vy = 0; p.onGround = true; p.jumpCount = 0; }
        else if (p.vy < 0) { p.y = s.y + s.h; p.vy = 0; }
      }
    }
  }

  // ---- Game Loop ----
  function update(dt) {
    const w = world; const p = w.player;
    if (w.state !== 'playing') return;

    // Move platform (mover)
    w.mover.t += dt * 0.0012; // speed
    w.mover.x = 160 + Math.sin(w.mover.t) * 80;

    // Spikes animate
    for (const sp of w.spikes) sp.phase += dt * 0.01;

    // Input -> velocity
    const accel = p.onGround ? ACCEL : ACCEL*0.6;
    if (input.left)  { p.vx -= accel; p.facing = -1; }
    if (input.right) { p.vx += accel; p.facing =  1; }

    // Friction / drag
    p.vx *= p.onGround ? GROUND : AIR;
    p.vx = clamp(p.vx, -MAXSPEED, MAXSPEED);

    // Gravity
    p.vy += GRAVITY;
    p.vy = Math.min(p.vy, 14);

    // Collide with solids (platforms + mover + ground)
    const solids = w.platforms.concat([w.mover]);
    moveAndCollide(p, solids);

    // Ride moving platform when standing on it
    if (aabb(p, w.mover) && p.y + p.h <= w.mover.y + 2) {
      p.x += Math.cos(w.mover.t) * 0.96; // subtle carry
    }

    // Collect coins
    for (const c of w.coins) {
      if (!c.taken) {
        const dx = (p.x + p.w/2) - c.x;
        const dy = (p.y + p.h/2) - c.y;
        if (dx*dx + dy*dy < (c.r + Math.max(p.w,p.h)/3)**2) {
          c.taken = true; w.score++; puff(c.x, c.y, 12, '#ffe192');
        }
      }
    }
    if (w.score >= w.goal) w.door.open = true;

    // Hazards: spikes (use animated height)
    for (const s of w.spikes) {
      const spikeHeight = 8 + Math.sin(s.phase)*6;
      const hazard = {x:s.x, y:s.y + (16 - spikeHeight), w:s.w, h: spikeHeight};
      if (aabb(p, hazard)) {
        w.state = 'dead'; puff(p.x+p.w/2, p.y+p.h/2, 26, '#ffb3b3');
      }
    }

    // Door win
    if (w.door.open && aabb(p, w.door)) {
      w.state = 'won'; puff(p.x+p.w/2, p.y+p.h/2, 40, '#a7f3d0');
    }

    // Fall off the world
    if (p.y > H + 80) { w.state = 'dead'; }

    statusEl.textContent = `Score: ${w.score} / ${w.goal}`;
  }

  function draw() {
    const w = world; const p = w.player;

    // Sky gradient + distant parallax mountains
    const g = ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,'#0e153a'); g.addColorStop(1,'#091022');
    ctx.fillStyle = g; ctx.fillRect(0,0,W,H);

    // Stars
    ctx.globalAlpha = .25;
    for (let i=0;i<80;i++) { ctx.fillRect((i*79)%W, (i*53)%H*0.4, 2, 2); }
    ctx.globalAlpha = 1;

    // Ground and platforms
    for (const s of w.platforms) rect(s.x, s.y, s.w, s.h, '#2a335e');

    // Moving platform
    rect(w.mover.x, w.mover.y, w.mover.w, w.mover.h, '#33407a');

    // Door
    ctx.fillStyle = w.door.open ? '#5eead4' : '#384979';
    rect(w.door.x, w.door.y, w.door.w, w.door.h);
    rect(w.door.x+6, w.door.y+6, w.door.w-12, w.door.h-12, 'rgba(0,0,0,.25)');

    // Spikes
    for (const s of w.spikes) {
      const spikeHeight = 8 + Math.sin(s.phase)*6;
      ctx.fillStyle = '#8b3140';
      rect(s.x, s.y + (16 - spikeHeight), s.w, spikeHeight);
      // little chevrons
      ctx.fillStyle = '#b94859';
      rect(s.x+6, s.y + (16 - spikeHeight)+4, s.w-12, 3);
    }

    // Coins
    for (const c of w.coins) {
      if (!c.taken) {
        const r = c.r + Math.sin(performance.now()*0.006 + c.x)*1.2;
        circle(c.x, c.y, r, '#ffd166');
        circle(c.x, c.y, r*0.55, '#ffefb5');
      }
    }

    // Player (simple lil' robot)
    ctx.save();
    ctx.translate(p.x + p.w/2, p.y + p.h/2);
    ctx.scale(p.facing, 1);
    ctx.translate(-p.w/2, -p.h/2);
    rect(0, 0, p.w, p.h, '#6ee7ff');
    // eyes
    rect(6, 8, 4, 4, '#0e1326');
    rect(p.w-10, 8, 4, 4, '#0e1326');
    // feet shadows
    rect(4, p.h-4, 6, 3, 'rgba(0,0,0,.25)');
    rect(p.w-10, p.h-4, 6, 3, 'rgba(0,0,0,.25)');
    ctx.restore();

    // Particles
    drawParticles();

    // State overlays
    if (w.state === 'dead' || w.state === 'won') {
      ctx.fillStyle = 'rgba(0,0,0,.45)';
      ctx.fillRect(0,0,W,H);
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 36px system-ui, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(w.state === 'won' ? 'You Win! 🎉' : 'Ouch! Try Again', W/2, H/2 - 10);
      ctx.font = '16px system-ui, sans-serif';
      ctx.fillText('Press R to restart', W/2, H/2 + 24);
    }
  }

  function loop(t) {
    const dt = clamp(t - lastTime, 0, 34); // cap delta for stability
    lastTime = t;
    if (world.state === 'playing') update(dt);
    updateParticles();
    draw();
    requestAnimationFrame(loop);
  }

  // Start
  reset();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
