<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Block Party Server</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet"/>
  <style>
    body {
      margin: 0;
      font-family: 'Press Start 2P', cursive;
      background: url('https://cdn.jsdelivr.net/gh/ErikBoesen/minecraft-assets@master/assets/minecraft/textures/block/grass_block_top.png') repeat;
      background-size: 64px 64px;
      color: #fff;
      text-align: center;
      padding: 50px 20px;
    }
    h1 {
      font-size: 2em;
      color: #00ff00;
      text-shadow: 2px 2px 0 #000;
    }
    p {
      text-shadow: 1px 1px 0 #000;
    }
    .ip-box {
      background: rgba(0, 0, 0, 0.85);
      display: inline-block;
      padding: 20px;
      border: 3px solid #00ff00;
      border-radius: 10px;
      margin-top: 20px;
    }
    .footer {
      margin-top: 50px;
      font-size: 0.75em;
      opacity: 0.85;
      color: #ccc;
    }
    a {
      color: #00ffff;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <h1>🟩 Welcome to Block Party Server! 🟫</h1>
  <p>A Minecraft world for friends, fun, and creativity.</p>

  <div class="ip-box">
    <p><strong>Server IP:</strong></p>
    <p>mc.blockpartyserver.com</p>
    <p><em>Version: 1.20.1 (Java Edition)</em></p>
  </div>

  <div class="footer">
    <p>Need help? Contact <a href="mailto:admin@blockpartyserver.com">admin@blockpartyserver.com</a></p>
    <p>Hosted with ❤️ by Dad</p>
  </div>
</body>
</html>
