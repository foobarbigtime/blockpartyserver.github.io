<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Tiny Platformer (Mobile)</title>
  <style>
    :root { --bg: #0e1326; --fg: #e6e6f0; --accent: #6ee7ff; }
    html, body { height: 100%; margin: 0; background: radial-gradient(1200px 600px at 50% 0%, #1b2552, var(--bg)); color: var(--fg); font-family: system-ui, sans-serif; display:grid; place-items:center; overflow:hidden; touch-action:none; }
    #frame { position: relative; display:inline-block; box-shadow:0 10px 40px rgba(0,0,0,.6); border-radius:16px; overflow:hidden; }
    canvas { display:block; image-rendering:pixelated; width:min(96vw, 1280px); height:calc(min(96vw, 1280px) * (9/16)); max-height:90vh; border:2px solid rgba(255,255,255,.08); touch-action:none; }
    .hud { position:absolute; inset:0; display:flex; align-items:flex-start; justify-content:space-between; pointer-events:none; padding:10px 14px; font-weight:600; text-shadow:0 2px 4px rgba(0,0,0,.5); font-size:14px; }
    a.btn { position:absolute; right:10px; bottom:10px; pointer-events:auto; text-decoration:none; color:var(--bg); background:var(--accent); padding:8px 12px; border-radius:999px; font-weight:700; font-size:14px; }
    .controls { position:absolute; left:0; right:0; bottom:8px; display:none; justify-content:center; gap:12px; pointer-events:auto; padding:0 10px; }
    .cbtn { font: 900 18px system-ui, sans-serif; width:64px; height:64px; border-radius:16px; border:none; background:rgba(255,255,255,.92); color:#0e1326; box-shadow:0 8px 24px rgba(0,0,0,.35); }
    .cbtn:active { transform: translateY(2px); }
    .cbtn.jump { width:90px; }
    @media (pointer: coarse), (max-width: 900px) { .controls { display:flex; } a.btn { display:none; } }
  </style>
</head>
<body>
  <div id="frame">
    <canvas id="game" width="960" height="540" aria-label="Platformer game"></canvas>
    <div class="hud">
      <div class="left" id="status">Score: 0 / 6</div>
      <div class="right">←/→ move • ↑/Space jump • R restart</div>
    </div>
    <div class="controls" aria-label="Mobile controls">
      <button id="btnLeft" class="cbtn">◀</button>
      <button id="btnJump" class="cbtn jump">⤒</button>
      <button id="btnRight" class="cbtn">▶</button>
    </div>
    <a href="#" class="btn" id="resetBtn">Restart</a>
  </div>
<script>
(() => {
  const canvas=document.getElementById('game'); const ctx=canvas.getContext('2d');
  const statusEl=document.getElementById('status'); const resetBtn=document.getElementById('resetBtn');
  const btnLeft=document.getElementById('btnLeft'); const btnRight=document.getElementById('btnRight'); const btnJump=document.getElementById('btnJump');
  const W=canvas.width,H=canvas.height; const clamp=(v,lo,hi)=>Math.max(lo,Math.min(hi,v));
  const aabb=(a,b)=>a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;
  const rect=(x,y,w,h,c)=>{ctx.fillStyle=c;ctx.fillRect(x,y,w,h)}; const circle=(x,y,r,c)=>{ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fillStyle=c;ctx.fill()};
  let world,input,lastTime; function makeLevel(){const platforms=[{x:0,y:H-40,w:W,h:40}]; const coins=[{x:100,y:H-60,r:10,taken:false}]; const player={x:20,y:H-72,w:24,h:32,vx:0,vy:0,onGround:false,facing:1,jumpCount:0,maxJumps:1}; return{platforms,coins,player,score:0,goal:coins.length,state:'playing'};}
  function reset(){world=makeLevel();input={left:false,right:false,up:false};lastTime=performance.now();}
  const KEY={LEFT:["ArrowLeft","a"],RIGHT:["ArrowRight","d"],JUMP:["ArrowUp"," ","w"]};
  addEventListener('keydown',e=>{if(KEY.LEFT.includes(e.key))input.left=true;if(KEY.RIGHT.includes(e.key))input.right=true;if(KEY.JUMP.includes(e.key)){input.up=true;attemptJump();}if(e.key==='r')reset();});
  addEventListener('keyup',e=>{if(KEY.LEFT.includes(e.key))input.left=false;if(KEY.RIGHT.includes(e.key))input.right=false;if(KEY.JUMP.includes(e.key))input.up=false;});
  function bindHold(btn,onDown,onUp){if(!btn)return;const d=e=>{e.preventDefault();onDown();};const u=e=>{e.preventDefault();onUp();};btn.addEventListener('pointerdown',d,{passive:false});btn.addEventListener('pointerup',u,{passive:false});btn.addEventListener('pointerleave',u,{passive:false});btn.addEventListener('pointercancel',u,{passive:false});}
  bindHold(btnLeft,()=>input.left=true,()=>input.left=false);
  bindHold(btnRight,()=>input.right=true,()=>input.right=false);
  if(btnJump){btnJump.addEventListener('pointerdown',e=>{e.preventDefault();input.up=true;attemptJump();},{passive:false});btnJump.addEventListener('pointerup',e=>{e.preventDefault();input.up=false;},{passive:false});}
  resetBtn.onclick=()=>reset();
  function attemptJump(){const p=world.player;if(world.state!=='playing')return;if(p.onGround||p.jumpCount<p.maxJumps){p.vy=-10.5;p.onGround=false;p.jumpCount++;}}
  const GRAVITY=0.6,ACCEL=0.6,MAXSPEED=4.1,AIR=0.9,GROUND=0.8;
  function moveAndCollide(p,solids){p.x+=p.vx;for(const s of solids){if(aabb(p,s)){if(p.vx>0)p.x=s.x-p.w;else if(p.vx<0)p.x=s.x+s.w;p.vx=0;}}p.y+=p.vy;p.onGround=false;for(const s of solids){if(aabb(p,s)){if(p.vy>0){p.y=s.y-p.h;p.vy=0;p.onGround=true;p.jumpCount=0;}else if(p.vy<0){p.y=s.y+s.h;p.vy=0;}}}}
  function update(dt){const w=world,p=w.player;if(w.state!=='playing')return;if(input.left)p.vx-=p.onGround?ACCEL:ACCEL*0.6;if(input.right)p.vx+=p.onGround?ACCEL:ACCEL*0.6;p.vx*=p.onGround?GROUND:AIR;p.vx=clamp(p.vx,-MAXSPEED,MAXSPEED);p.vy+=GRAVITY;p.vy=Math.min(p.vy,14);moveAndCollide(p,w.platforms);for(const c of w.coins){if(!c.taken){const dx=p.x+p.w/2-c.x,dy=p.y+p.h/2-c.y;if(dx*dx+dy*dy<(c.r+Math.max(p.w,p.h)/3)**2){c.taken=true;w.score++;}}}if(w.score>=w.goal)w.state='won';if(p.y>H+80)w.state='dead';statusEl.textContent=`Score: ${w.score} / ${w.goal}`;}
  function draw(){const w=world,p=w.player;ctx.fillStyle='#0e153a';ctx.fillRect(0,0,W,H);for(const s of w.platforms)rect(s.x,s.y,s.w,s.h,'#2a335e');for(const c of w.coins)if(!c.taken)circle(c.x,c.y,c.r,'#ffd166');rect(p.x,p.y,p.w,p.h,'#6ee7ff');if(w.state!=='playing'){ctx.fillStyle='rgba(0,0,0,.45)';ctx.fillRect(0,0,W,H);ctx.fillStyle='#fff';ctx.font='bold 24px sans-serif';ctx.textAlign='center';ctx.fillText(w.state==='won'?'You Win!':'Game Over',W/2,H/2);}}
  function loop(t){const dt=clamp(t-lastTime,0,34);lastTime=t;if(world.state==='playing')update(dt);draw();requestAnimationFrame(loop);}
  reset();requestAnimationFrame(loop);
})();
</script>
</body>
</html>
